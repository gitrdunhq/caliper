services:
  postgres:
    image: postgres:16
    container_name: caliper-postgres
    environment:
      POSTGRES_DB: caliper
      POSTGRES_USER: caliper
      POSTGRES_PASSWORD: caliper_dev
    ports:
      - "12432:5432"
    volumes:
      - caliper_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caliper -d caliper"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  caliper_pgdata:
